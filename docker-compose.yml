version: '3.8'

services:
  postgres-db:
    image: postgres:16
    container_name: jwt-ai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jwt_ai_system
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "5038:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - postgres-db
    restart: unless-stopped

  resource-service-1:
    build: ./resource-service-1
    container_name: resource-service-1
    ports:
      - "5226:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped

  resource-service-2:
    build: ./resource-service-2
    container_name: resource-service-2
    ports:
      - "5295:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped

volumes:
  postgres_data:
